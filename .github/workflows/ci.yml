name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore Toyopuc.sln

      - name: Build
        run: dotnet build Toyopuc.sln -c Release --no-restore

      - name: Test
        run: dotnet test Toyopuc.sln -c Release --no-build
